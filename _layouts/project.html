---
layout: default
---
<article class="content-section prose article-page">
  <p class="eyebrow">Research project</p>
  <h1>{{ page.title }}</h1>
  {% if page.short_description %}<p class="lead">{{ page.short_description }}</p>{% endif %}
  {% if page.image %}
    <img class="project-hero-image" src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: page.title | escape }}">
  {% endif %}
  <div class="tag-row spacious">
    {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
  </div>
  {{ content }}
</article>
