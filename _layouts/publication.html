---
layout: default
---
{% assign publication_type_label = page.display_type | default: page.type %}
<article class="content-section prose article-page publication-page">
  <div class="card-meta publication-page-meta">
    <span>{{ page.year }}</span>
    <span>{{ publication_type_label }}</span>
  </div>
  <h1>{{ page.title }}</h1>
  <p class="authors">{{ page.authors }}</p>
  <p class="publication-venue"><em>{{ page.venue }}</em></p>
  {% include publication-links.html item=page %}

  {{ content }}
</article>
