<header class="site-header">
  <a class="brand" href="{{ '/' | relative_url }}" aria-label="Home">
    <span class="brand-mark">XG</span>
    <span class="brand-text">
      <strong>{{ site.data.profile.short_name | default: site.title }}</strong>
      <small>{{ site.data.profile.headline }}</small>
    </span>
  </a>

  <button class="nav-toggle" aria-label="Open navigation" aria-expanded="false">☰</button>

  <nav class="site-nav" aria-label="Main navigation">
    {% for item in site.data.navigation %}
      <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}aria-current="page"{% endif %}>{{ item.label }}</a>
    {% endfor %}
    <a href="{{ '/contact/' | relative_url }}">Contact</a>
    <button class="theme-toggle" type="button" aria-label="Toggle color theme">☾</button>
  </nav>
</header>
