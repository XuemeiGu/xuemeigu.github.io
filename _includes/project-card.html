<article class="project-card">
  <a class="project-card-link" href="{{ project.url | relative_url }}" aria-label="Read more about {{ project.title | escape }}">
    {% if project.image %}
      <img src="{{ project.image | relative_url }}" alt="{{ project.image_alt | default: project.title | escape }}" loading="lazy">
    {% endif %}
    <div class="project-card-body">
      <h2>{{ project.title }}</h2>
      {% if project.short_description %}<p>{{ project.short_description }}</p>{% endif %}
    </div>
  </a>
</article>
