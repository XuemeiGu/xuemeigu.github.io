<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
  <meta name="theme-color" content="#0f1115">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ site.image | relative_url }}">
  <link rel="icon" href="{{ '/assets/img/favicon-placeholder.svg' | relative_url }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
