<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
  <meta name="theme-color" content="#0f1115">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ site.image | relative_url }}">
  {% assign favicon_path = '/assets/img/favicon-placeholder.png' | relative_url %}
  <link rel="icon" href="{{ '/favicon.ico?v=20260617' | relative_url }}" sizes="any">
  <link rel="shortcut icon" href="{{ '/favicon.ico?v=20260617' | relative_url }}">
  <link rel="icon" href="{{ favicon_path }}?v=20260617" type="image/png" sizes="427x427">
  <link rel="apple-touch-icon" href="{{ favicon_path }}?v=20260617">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400..800;1,400..700&amp;display=swap">
<link rel="stylesheet" href="{{ '/assets/css/main.css?v=20260722-33' | relative_url }}">
</head>
