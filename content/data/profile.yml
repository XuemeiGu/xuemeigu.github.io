summary: >-
  I am a junior research group leader at Friedrich Schiller University Jena, where I lead the AI Quantum Lab. My research lies at the intersection of artificial intelligence and quantum physics, combining the development of intelligent systems for scientific discovery with research on quantum systems and phenomena. My work includes AI/ML methods for designing physical experiments, generating research ideas, and uncovering possibilities that might otherwise be overlooked, as well as conceptual, theoretical, and experimental research in quantum physics. More broadly, I am interested in how intelligence, computation, and physical principles can be integrated to advance science, using AI to explore complex quantum systems and adapting ideas from physics to inspire new forms of machine intelligence. 

research_keywords:
  - "AI for Science, Scientific Discovery, and Scientific Creativity"
  - "Quantum Physics, Quantum Optics, and Quantum Technologies"
  - "De-novo Design of Physics Experiments"

