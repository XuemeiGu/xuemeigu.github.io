# ------------------------------------------------------------
# Personal academic website configuration
# Replace PLACEHOLDER values with your own details.
# ------------------------------------------------------------

title: "Xuemei Gu"
description: "intelligence meets physics to accelerate discovery"
url: "https://xuemeigu.github.io"    
baseurl: ""                            
lang: "en"
timezone: "Europe/Berlin"

logo: "/assets/img/profile.png"
image: "/assets/img/social-preview-placeholder.svg"

data_dir: content/data
collections_dir: content/collections

collections:
  projects:
    output: true
    permalink: /research/:name/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "projects"
    values:
      layout: project
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .DS_Store
  - CNAME.example
  - docs
